services:
  db:
    image: postgres:17-alpine
    container_name: potpuri-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      internal:
        aliases:
          - potpuri-db

  app:
    build: .
    container_name: potpuri-app
    restart: unless-stopped
    env_file: .env
    environment:
      POTPURI_ADDR: ":8080"
      POTPURI_DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@potpuri-db:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - internal
      - caddy_edge

networks:
  internal:
  caddy_edge:
    external: true
    name: bleeek_backend

volumes:
  postgres_data:
