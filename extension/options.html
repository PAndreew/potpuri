<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Potpuri Extension</title>
  <style>
    body{font:16px/1.45 system-ui,sans-serif;max-width:520px;margin:40px auto;padding:0 20px;color:#171717}
    header{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    header img{width:36px;height:36px}
    h1{font-size:1.5rem;margin:0}
    label{display:block;font-size:.9rem;font-weight:600;margin-top:18px}
    input{font:inherit;width:100%;box-sizing:border-box;padding:9px 10px;margin-top:5px;border:1px solid #aaa;border-radius:4px}
    button{font:inherit;margin-top:20px;padding:9px 18px;border:1px solid #111;border-radius:4px;background:#111;color:#fff;cursor:pointer}
    p{color:#555}
    #status{display:inline-block;margin-left:10px;font-size:.9rem;color:#16794b}
  </style>
</head>
<body>
  <header><img src="icons/icon-48.png" alt=""><h1>Add to Potpuri</h1></header>
  <p>Create an API token in Potpuri under <strong>API Tokens</strong>, then enter it here.</p>
  <label for="baseUrl">Potpuri URL</label>
  <input id="baseUrl" type="url" placeholder="https://potpuri.cc" required>
  <label for="apiToken">API token</label>
  <input id="apiToken" type="password" autocomplete="off" placeholder="pt_..." required>
  <button id="save" type="button">Save</button><span id="status" role="status" aria-live="polite"></span>
  <script src="options.js"></script>
</body>
</html>
